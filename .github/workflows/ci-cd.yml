name: Annotate CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]


jobs:
  build:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # - name: Setup Java
    #   uses: actions/setup-java@v4
    #   with:
    #     distribution: temurin
    #     java-version: 21

    # - name: Build Spring Boot services
    #   run: |
    #     cd Service-Registry && mvn clean package -DskipTests && cd ..
    #     cd Config-Server && mvn clean package -DskipTests && cd ..
    #     cd API-Gateway && mvn clean package -DskipTests && cd ..
    #     cd Auth-Service && mvn clean package -DskipTests && cd ..
    #     cd Access-Service && mvn clean package -DskipTests && cd ..
    #     cd Video-Service && mvn clean package -DskipTests && cd ..
    #     cd Media-Service && mvn clean package -DskipTests && cd ..
    #     cd Feedback-Service && mvn clean package -DskipTests && cd ..


    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # - name: Export environment variables
    #   run: |
    #     echo "CONFIG_SERVER_USERNAME=${{ secrets.CONFIG_SERVER_USERNAME }}" >> $GITHUB_ENV
    #     echo "CONFIG_SERVER_PASSWORD=${{ secrets.CONFIG_SERVER_PASSWORD }}" >> $GITHUB_ENV


    - name: Build and push images
      run: |
        docker compose build
        docker compose push

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/annotate-microservice
          export CONFIG_SERVER_USERNAME=${{ secrets.CONFIG_SERVER_USERNAME }}
          export CONFIG_SERVER_PASSWORD=${{ secrets.CONFIG_SERVER_PASSWORD }}
          docker-compose pull
          docker-compose up -d
