spring.application.name=API-Gateway

server.port=8088

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://98.130.112.17:80
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

spring.config.import=configserver:http://config-server:8080/
spring.profiles.active=default

spring.cloud.gateway.server.webflux.routes[0].id=AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].uri=lb://Auth-Service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

spring.cloud.gateway.server.webflux.routes[1].id=VIDEO-SERVICE
spring.cloud.gateway.server.webflux.routes[1].uri=lb://Video-Service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/videos/**

spring.cloud.gateway.server.webflux.routes[2].id=ACCESS-SERVICE
spring.cloud.gateway.server.webflux.routes[2].uri=lb://Access-Service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/video-access/**,/api/access-code/**

spring.cloud.gateway.server.webflux.routes[3].id=FEEDBACK-SERVICE
spring.cloud.gateway.server.webflux.routes[3].uri=lb://Feedback-Service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/feedback/**

spring.cloud.gateway.server.webflux.routes[4].id=MEDIA-SERVICE
spring.cloud.gateway.server.webflux.routes[4].uri=lb://Media-Service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/media/**
